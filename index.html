<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポジションスカウター</title>
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #0a0e1a;
      color: #d1d9e6;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 12px 16px 16px;
      gap: 10px;
      overflow: hidden;
    }

    /* ── テーブルエリア ── */
    .table-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      width: 100%;
      max-width: 420px;
      align-self: center;
    }
    .poker-table {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 190px; height: 124px;
      border-radius: 62px;
      background: radial-gradient(ellipse at 40% 35%, #1a5c2a, #0d3318);
      box-shadow: 0 0 0 5px #2a1800, 0 0 0 9px #7a5a10, 0 0 0 11px #4a3808, 0 4px 28px rgba(0,0,0,0.7);
    }
    .table-inner-text {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
      pointer-events: none;
    }
    .table-title-text {
      font-size: 0.55rem; font-weight: bold;
      color: rgba(255,255,255,0.18); letter-spacing: 0.14em; text-transform: uppercase;
    }
    .dealer-info-text { font-size: 0.6rem; color: rgba(255,255,255,0.28); }


    /* テーブル内の人数コントロール */
    .table-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: all;
      margin-top: 3px;
    }
    .table-count-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.4);
      color: rgba(255,255,255,0.9);
      font-size: 1.2rem; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.15s;
    }
    .table-count-btn:active  { background: rgba(0,0,0,0.65); }
    .table-count-btn:disabled { opacity: 0.25; pointer-events: none; }
    .table-count-num {
      font-size: 1.15rem; font-weight: bold;
      color: rgba(255,255,255,0.92);
      min-width: 1.5rem; text-align: center; line-height: 1;
    }
    .table-count-unit { font-size: 0.62rem; color: rgba(255,255,255,0.45); }

    /* MEドット */
    .me-dot {
      position: absolute; top: 3px; right: 4px;
      width: 11px; height: 11px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .seat.is-me .me-dot {
      background: #22d3ee; border-color: #22d3ee;
      box-shadow: 0 0 5px rgba(34,211,238,0.6);
    }
    .seat.is-me {
      border-color: #0891b2;
      box-shadow: 0 0 10px rgba(34,211,238,0.35);
    }

    /* ── シートカード ── */
    .seat {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 64px;
      background: #111827;
      border: 1px solid #1e2a3a;
      border-radius: 9px;
      padding: 4px 4px 5px;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    .seat:active { background: #1a2a40; }
    .seat.is-btn { border-color: #f59e0b; background: #1c1408; box-shadow: 0 0 8px rgba(245,158,11,0.3); }
    .seat-num-label { font-size: 0.55rem; color: #4a5568; line-height: 1; margin-bottom: 2px; }
    .seat.is-btn .seat-num-label { color: #a07820; }
    .seat-badge { display: inline-block; font-size: 0.72rem; font-weight: bold; padding: 1px 4px; border-radius: 4px; line-height: 1.5; }
    .dealer-chip-icon { font-size: 0.7rem; line-height: 1; margin-top: 1px; display: block; }

    .badge-btn  { background:#2c1f00; color:#f59e0b; }
    .badge-sb   { background:#0e1e40; color:#60a5fa; }
    .badge-bb   { background:#2a0d0d; color:#f87171; }
    .badge-utg  { background:#0a2010; color:#4ade80; }
    .badge-utg1 { background:#081a0e; color:#34d399; }
    .badge-utg2 { background:#061510; color:#2dd4bf; }
    .badge-mp   { background:#1a0a2e; color:#c084fc; }
    .badge-lj   { background:#160826; color:#a855f7; }
    .badge-hj   { background:#1f0e00; color:#fb923c; }
    .badge-co   { background:#001a1a; color:#2dd4bf; }

    /* ── 次のハンドボタン ── */
    .next-btn {
      flex-shrink: 0;
      padding: 13px;
      background: #1d4ed8; color: white;
      border: none; border-radius: 11px;
      font-size: 0.95rem; font-weight: bold;
      cursor: pointer; letter-spacing: 0.04em;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
      max-width: 420px; width: 100%; align-self: center;
    }
    .next-btn:active { background: #1e3a9f; }
    .bluff-message {
      display: none;
      flex-shrink: 0;
      max-width: 420px;
      width: 100%;
      align-self: center;
      padding: 12px 14px;
      border: 1px solid rgba(245,158,11,0.45);
      border-radius: 11px;
      background: rgba(245,158,11,0.12);
      color: #fbbf24;
      font-size: 0.9rem;
      font-weight: bold;
      text-align: center;
    }
    .bluff-message.show { display: block; }
  </style>
</head>
<body>

  <!-- テーブル -->
  <div class="table-wrap" id="table-wrap">
    <div class="poker-table">
      <div class="table-inner-text">
        <div class="table-controls">
          <button class="table-count-btn" id="btn-minus" onclick="changeCount(-1)">−</button>
          <span class="table-count-num" id="player-num">6</span>
          <span class="table-count-unit">人</span>
          <button class="table-count-btn" id="btn-plus" onclick="changeCount(+1)">＋</button>
        </div>
      </div>
    </div>
  </div>
  <!-- 次のハンド -->
  <div class="bluff-message" id="bluff-message">このハンドではブラフをしてください</div>
  <button class="next-btn" onclick="nextHand()">次のハンド →</button>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const POS_MAP = {
    2:  [{key:'btn',label:'BTN'},{key:'bb',label:'BB'}],
    3:  [{key:'btn',label:'BTN'},{key:'sb',label:'SB'},{key:'bb',label:'BB'}],
    4:  [{key:'btn',label:'BTN'},{key:'sb',label:'SB'},{key:'bb',label:'BB'},{key:'utg',label:'UTG'}],
    5:  [{key:'btn',label:'BTN'},{key:'sb',label:'SB'},{key:'bb',label:'BB'},{key:'utg',label:'UTG'},{key:'co',label:'CO'}],
    6:  [{key:'btn',label:'BTN'},{key:'sb',label:'SB'},{key:'bb',label:'BB'},{key:'utg',label:'UTG'},{key:'hj',label:'HJ'},{key:'co',label:'CO'}],
    7:  [{key:'btn',label:'BTN'},{key:'sb',label:'SB'},{key:'bb',label:'BB'},{key:'utg',label:'UTG'},{key:'mp',label:'MP'},{key:'hj',label:'HJ'},{key:'co',label:'CO'}],
    8:  [{key:'btn',label:'BTN'},{key:'sb',label:'SB'},{key:'bb',label:'BB'},{key:'utg',label:'UTG'},{key:'utg1',label:'UTG+1'},{key:'mp',label:'MP'},{key:'hj',label:'HJ'},{key:'co',label:'CO'}],
    9:  [{key:'btn',label:'BTN'},{key:'sb',label:'SB'},{key:'bb',label:'BB'},{key:'utg',label:'UTG'},{key:'utg1',label:'UTG+1'},{key:'mp',label:'MP'},{key:'lj',label:'LJ'},{key:'hj',label:'HJ'},{key:'co',label:'CO'}],
    10: [{key:'btn',label:'BTN'},{key:'sb',label:'SB'},{key:'bb',label:'BB'},{key:'utg',label:'UTG'},{key:'utg1',label:'UTG+1'},{key:'utg2',label:'UTG+2'},{key:'mp',label:'MP'},{key:'lj',label:'LJ'},{key:'hj',label:'HJ'},{key:'co',label:'CO'}],
  };
  const BADGE_CLASS = {
    btn:'badge-btn',sb:'badge-sb',bb:'badge-bb',utg:'badge-utg',utg1:'badge-utg1',
    utg2:'badge-utg2',mp:'badge-mp',lj:'badge-lj',hj:'badge-hj',co:'badge-co',
  };

  let playerCount = 6;
  let dealerSeat  = 1;
  let mySeat      = 1;
  let showBluffPrompt = false;

  /* ── Firebase ── */
  firebase.initializeApp({
    apiKey: "AIzaSyCfvqQWLB8NJqmaH0k2G0wPcbJJjz2Vu4A",
    authDomain: "kaimemo-58bad.firebaseapp.com",
    projectId: "kaimemo-58bad",
    storageBucket: "kaimemo-58bad.firebasestorage.app",
    messagingSenderId: "308069117698",
    appId: "1:308069117698:web:c61a57853abb7e8ffb1c1b"
  });
  const db     = firebase.firestore();
  const docRef = db.collection('data').doc('amuse-counter');

  function save() {
    docRef.set({ playerCount, dealerSeat, mySeat, showBluffPrompt })
      .catch(err => console.error('保存エラー:', err.message));
  }

  /* ── テーブル描画 ── */
  function seatPos(idx, total) {
    const wrap = document.getElementById('table-wrap');
    const W = wrap.offsetWidth  || 360;
    const H = wrap.offsetHeight || 300;
    const rx = W * 0.38, ry = H * 0.41;
    // mySeat が常にテーブル下部（ハンドバー寄り）に来るよう角度をオフセット
    const angle = ((idx - (mySeat - 1)) / total) * 2 * Math.PI + Math.PI / 2;
    return { x: W / 2 + rx * Math.cos(angle), y: H / 2 + ry * Math.sin(angle) };
  }

  function render() {
    document.getElementById('player-num').textContent = playerCount;
    document.getElementById('btn-minus').disabled = playerCount <= 2;
    document.getElementById('btn-plus').disabled  = playerCount >= 10;
    document.getElementById('bluff-message').classList.toggle('show', showBluffPrompt);

    const wrap = document.getElementById('table-wrap');
    wrap.querySelectorAll('.seat').forEach(el => el.remove());

    const positions = POS_MAP[playerCount];

    for (let i = 0; i < playerCount; i++) {
      const seatNum = i + 1;
      const offset  = (seatNum - dealerSeat + playerCount) % playerCount;
      const pos     = positions[offset];
      const isBtn   = offset === 0;
      const isMe    = seatNum === mySeat;
      const { x, y } = seatPos(i, playerCount);

      const div = document.createElement('div');
      div.className = 'seat' + (isBtn ? ' is-btn' : '') + (isMe ? ' is-me' : '');
      div.style.left = x + 'px';
      div.style.top  = y + 'px';
      div.onclick = () => { dealerSeat = seatNum; render(); save(); };
      div.innerHTML = `
        <div class="seat-num-label">Seat ${seatNum}</div>
        <span class="seat-badge ${BADGE_CLASS[pos.key]}">${pos.label}</span>
        ${isBtn ? '<span class="dealer-chip-icon">🪙</span>' : ''}
        <span class="me-dot" title="自分のシート" onclick="event.stopPropagation(); setMySeat(${seatNum})"></span>
      `;
      wrap.appendChild(div);
    }
  }

  function setMySeat(seatNum) {
    mySeat = seatNum;
    render(); save();
  }
  function changeCount(delta) {
    const next = playerCount + delta;
    if (next < 2 || next > 10) return;
    playerCount = next;
    if (dealerSeat > playerCount) dealerSeat = playerCount;
    render(); save();
  }

  function bluffFrequency(count) {
    const minPlayers = 2;
    const maxPlayers = 10;
    const minRate = 0.02;
    const maxRate = 0.30;
    const clamped = Math.min(maxPlayers, Math.max(minPlayers, count));
    const t = (clamped - minPlayers) / (maxPlayers - minPlayers);
    return maxRate - (maxRate - minRate) * t;
  }

  function nextHand() {
    dealerSeat = (dealerSeat % playerCount) + 1;
    showBluffPrompt = Math.random() < bluffFrequency(playerCount);
    render(); save();
  }


  /* ── 初期ロード ── */
  docRef.onSnapshot(snap => {
    if (snap.exists) {
      const d = snap.data();
      playerCount = d.playerCount ?? 6;
      dealerSeat  = d.dealerSeat  ?? 1;
      mySeat      = d.mySeat      ?? 1;
      showBluffPrompt = d.showBluffPrompt ?? false;
    }
    render();
  });
</script>
</body>
</html>
